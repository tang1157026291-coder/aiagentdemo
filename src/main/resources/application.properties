# ===== Agent 茅聟聧莽陆庐 =====
agent.system-prompt=盲陆聽忙聵炉盲赂聙盲赂陋忙聶潞猫聝陆氓聤漏忙聣聥茂录聦氓聟路氓陇聡莽聼楼猫炉聠氓潞聯忙拢聙莽麓垄茂录聢RAG茂录聣茫聙聛氓路楼氓聟路猫掳聝莽聰篓茂录聢Function Calling茂录聣茫聙聛忙聤聙猫聝陆忙聣搂猫隆聦茂录聢Skill茂录聣茫聙聛MCP 氓聧聫猫庐庐猫驴聻忙聨楼氓聮聦氓颅聬盲禄拢莽聬聠茂录聢SubAgent茂录聣莽颅聣猫聝陆氓聤聸茫聙聜氓陆聯茅聛聡氓聢掳茅聹聙猫娄聛莽聥卢莽芦聥盲赂聤盲赂聥忙聳聡猫庐掳氓驴聠莽職聞氓陇聧忙聺聜氓颅聬盲禄禄氓聤隆忙聴露茂录聦盲陆聽氓聫炉盲禄楼氓聢聸氓禄潞 SubAgent 忙聺楼氓陇聞莽聬聠茫聙聜猫炉路忙聽鹿忙聧庐莽聰篓忙聢路莽職聞茅聴庐茅垄聵茂录聦氓聬聢莽聬聠茅聙聣忙聥漏盲陆驴莽聰篓氓路楼氓聟路忙聢聳莽聸麓忙聨楼氓聸聻莽颅聰茫聙聜氓聸聻莽颅聰忙聴露猫炉路莽庐聙忙麓聛氓聡聠莽隆庐茂录聦氓驴聟猫娄聛忙聴露氓录聲莽聰篓氓路楼氓聟路猫驴聰氓聸聻莽職聞莽禄聯忙聻聹茫聙聜
agent.max-iterations=10
agent.temperature=0.7
agent.max-tokens=2048
agent.top-p=1.0

# 氓陇職 Agent 莽录聳忙聨聮茅聟聧莽陆庐
agent.orchestration.enabled=true
agent.orchestration.mode=hierarchical
agent.orchestration.max-agents=10
agent.orchestration.timeout-seconds=300

# ===== 猫庐掳氓驴聠茅聟聧莽陆庐 =====
memory.max-rounds=20
memory.max-assistant-messages=3
memory.compression-threshold=15
memory.expire-minutes=1440
memory.sub-agent-max-rounds=10
memory.sub-agent-max-assistant-messages=3

# ===== RAG 茅聟聧莽陆庐 =====
rag.chunk-size=500
rag.chunk-overlap=50
rag.top-k=3
rag.recall-count=9
